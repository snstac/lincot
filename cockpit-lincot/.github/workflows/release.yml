# Tag a release with `v*` (e.g. v1.2.3) to build source tarball + .deb and publish GitHub Release assets.
name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Pacify git safe.directory
        run: git config --global --add safe.directory '*'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev gettext

      - name: Tests, bundle, .deb, and source tarball
        env:
          NODE_ENV: production
        run: |
          make ci
          make dist

      - name: List release files
        run: ls -la cockpit-adsbcot*.deb cockpit-adsbcot*.tar.xz

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          # Makefile produces cockpit-adsbcot_<version>_all.deb and cockpit-adsbcot-<version>.tar.xz
          files: |
            cockpit-adsbcot_*.deb
            cockpit-adsbcot-*.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
