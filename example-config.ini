[lincot]
; LINCOT example configuration. All parameters ARE IN ALL CAPS.

; CoT destination (required). See PyTAK docs for tcp://, tls://, udp+wo://, etc.
COT_URL = udp://239.2.3.1:6969

; Identity (optional — defaults: hostname callsign, machine-id uid)
; CALLSIGN = my-edge-node
; COT_UID =

; Position: gpsd (default) OR static (STATIC_LAT + STATIC_LON both required)
; STATIC_LAT = 45.0
; STATIC_LON = -122.0
; STATIC_HAE = 100.0
; STATIC_COURSE = 0.0
; STATIC_SPEED = 0.0
GPS_INFO_CMD = gpspipe --json -n 5
POLL_INTERVAL = 61

; CoT event
COT_TYPE = a-f-G-E-S
COT_STALE = 3600

; Edge node info in CoT remarks and link
; COCKPIT_URL = http://myhost.local:9090/
; SSH_USER = pi
; REMARKS_EXTRA = Deployed site Alpha

; PyTAK: DEBUG, TAK_PROTO, PREF_PACKAGE, PYTAK_TLS_* — see https://pytak.rtfd.io/
